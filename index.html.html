<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Soccer Leg Tracker</title>
    <!-- Tailwind CSS for sleek modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen py-10 px-4 font-sans">

    <div class="max-w-xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tight">⚽ Soccer Leg Tracker</h1>
            <p class="text-slate-400 mt-2 text-sm">Keep your match-day power, speed, and armor locked in.</p>
        </header>

        <!-- Main Input Card -->
        <main class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 mb-8">
            
            <!-- Exercise Selection Grid -->
            <label class="block text-sm font-medium text-slate-400 mb-2">Select Exercise</label>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4" id="exerciseGrid">
                <button onclick="selectExercise(this)" class="exercise-btn bg-emerald-600 text-white font-semibold text-xs text-left p-3 rounded-lg border border-transparent transition" data-name="Skater Jumps (Lateral Power)">
                    👟 Skater Jumps (Lateral Power)
                </button>
                <button onclick="selectExercise(this)" class="exercise-btn bg-slate-700 text-slate-300 hover:bg-slate-600 text-xs text-left p-3 rounded-lg border border-transparent transition" data-name="Pistol Squats (Single-Leg Strength)">
                    🏋️‍♂️ Pistol Squats (Strength)
                </button>
                <button onclick="selectExercise(this)" class="exercise-btn bg-slate-700 text-slate-300 hover:bg-slate-600 text-xs text-left p-3 rounded-lg border border-transparent transition" data-name="Nordic Hamstring Curls (Knee Armor)">
                    🛡️ Nordic Curls (Knee Armor)
                </button>
                <button onclick="selectExercise(this)" class="exercise-btn bg-slate-700 text-slate-300 hover:bg-slate-600 text-xs text-left p-3 rounded-lg border border-transparent transition" data-name="Single-Leg Calf Raises (Ankle Stability)">
                    🦶 Calf Raises (Ankle Stability)
                </button>
            </div>

            <!-- Sets & Reps Inputs -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label for="sets" class="block text-sm font-medium text-slate-400 mb-1">Sets</label>
                    <input type="number" id="sets" value="3" class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg p-2.5 text-center text-lg font-bold focus:ring-2 focus:ring-sky-500 focus:outline-none">
                </div>
                <div>
                    <label for="reps" class="block text-sm font-medium text-slate-400 mb-1">Reps / Time</label>
                    <input type="number" id="reps" value="10" class="w-full bg-slate-700 text-white border border-slate-600 rounded-lg p-2.5 text-center text-lg font-bold focus:ring-2 focus:ring-sky-500 focus:outline-none">
                </div>
            </div>

            <!-- Submit Button -->
            <button onclick="logWorkout()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg active:scale-[0.98]">
                Log Training Set
            </button>
        </main>

        <!-- Workout History Feed -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-slate-200">Performance Log</h2>
                <button onclick="clearHistory()" class="text-xs text-slate-500 hover:text-red-400 transition underline">Clear All</button>
            </div>
            
            <div id="logContainer" class="space-y-2">
                <!-- Javascript will inject workout cards here -->
            </div>
        </section>
    </div>

    <!-- Website Logic Application -->
    <script>
        let currentExercise = "Skater Jumps (Lateral Power)";

        // Handle Active Selection State Styling
        function selectExercise(element) {
            document.querySelectorAll('.exercise-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'font-semibold');
                btn.classList.add('bg-slate-700', 'text-slate-300');
            });
            element.classList.remove('bg-slate-700', 'text-slate-300');
            element.classList.add('bg-emerald-600', 'text-white', 'font-semibold');
            currentExercise = element.getAttribute('data-name');
        }

        // Save entry into browser engine memory storage
        function logWorkout() {
            const sets = parseInt(document.getElementById('sets').value);
            const reps = parseInt(document.getElementById('reps').value);
            
            if (!sets || !reps) {
                alert("Please fill out both fields with valid numbers!");
                return;
            }

            const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            const newLog = {
                id: Date.now(),
                exercise: currentExercise,
                sets: sets,
                reps: reps,
                date: today
            };

            let existingLogs = JSON.parse(localStorage.getItem('soccer_workout_logs')) || [];
            existingLogs.unshift(newLog); // Put newest workout at top
            localStorage.setItem('soccer_workout_logs', JSON.stringify(existingLogs));

            renderLogs();
        }

        // Render logs from browser database onto interface screen
        function renderLogs() {
            const logContainer = document.getElementById('logContainer');
            const logs = JSON.parse(localStorage.getItem('soccer_workout_logs')) || [];

            if (logs.length === 0) {
                logContainer.innerHTML = `<p class="text-slate-500 italic text-center text-sm py-6">No sessions logged yet. Time to hit the pitch!</p>`;
                return;
            }

            logContainer.innerHTML = logs.map(item => `
                <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl flex justify-between items-center transition hover:border-slate-600">
                    <div>
                        <h4 class="font-medium text-white text-sm sm:text-base">${item.exercise}</h4>
                        <span class="text-xs text-slate-500">${item.date}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-emerald-400 font-bold text-xl">${item.sets} <span class="text-xs font-normal text-slate-400">x</span> ${item.reps}</span>
                    </div>
                </div>
            `).join('');
        }

        // Wipe history
        function clearHistory() {
            if (confirm("Are you sure you want to delete your entire soccer training log history?")) {
                localStorage.removeItem('soccer_workout_logs');
                renderLogs();
            }
        }

        // Run application data check automatically upon browser tab loading open
        window.onload = renderLogs;
    </script>
</body>
</html>
